<svg width="32" height="32" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="96" fill="#0A192F"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" stroke="#FFA500" stroke-width="4" fill="none"/>
  <!-- N tick with arrow (gold) -->
  <line x1="100" y1="4" x2="100" y2="20" stroke="#FFC107" stroke-width="3" stroke-linecap="round"/>
  <polygon points="100,2 96,12 104,12" fill="#FFC107"/>
  <!-- S/E/W ticks -->
  <line x1="100" y1="180" x2="100" y2="196" stroke="#FFA500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="180" y1="100" x2="196" y2="100" stroke="#FFA500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4" y1="100" x2="20" y2="100" stroke="#FFA500" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="48" fill="#0A192F" stroke="#FFA500" stroke-width="1.5"/>
  <!-- M monogram -->
  <text x="100" y="118" text-anchor="middle" font-size="56" font-weight="900" font-family="Inter, system-ui, sans-serif" fill="#FFFFFF" letter-spacing="-2">M</text>
</svg>
