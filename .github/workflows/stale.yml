# Stale issue/PR bot — automatically marks inactive issues and PRs.
#
# After 90 days of inactivity, issues and PRs are marked stale.
# After 14 more days of inactivity, they're closed. This keeps
# the issue tracker focused on active work.
#
# Exemptions: issues with the "pinned", "security", or "roadmap"
# labels are never marked stale.

name: Mark stale issues and pull requests

on:
  schedule:
    - cron: "30 1 * * *"  # Run daily at 1:30 UTC

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: |
            This issue has been inactive for 90 days and is being marked
            stale. It will be closed in 14 days unless there's new activity.
            If this is still relevant, comment to keep it open.
          stale-pr-message: |
            This PR has been inactive for 90 days and is being marked
            stale. It will be closed in 14 days unless there's new activity.
            If you're still working on this, push a commit to keep it open.
          close-issue-message: |
            This issue was closed due to inactivity. Reopen if still relevant.
          close-pr-message: |
            This PR was closed due to inactivity. Reopen if still being worked on.
          days-before-stale: 90
          days-before-close: 14
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned,security,roadmap"
          stale-issue-label: "stale"
          stale-pr-label: "stale"
