name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel previous runs of the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────
  # Type-check + lint the frontend (fast, runs on every push)
  # ───────────────────────────────────────────────────────────────
  frontend-check:
    name: Frontend typecheck + lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Oxlint
        # Oxlint catches React rules-of-hooks violations, unused vars,
        # and other JS/TS pitfalls that tsc can't see. Exits non-zero
        # on any error-level finding; warnings are tolerated (we have
        # a few known-acceptable ones like Fast Refresh hints).
        working-directory: .
        run: npx oxlint

      - name: Type check + build
        working-directory: .
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ───────────────────────────────────────────────────────────────
  # Test the metardu-core crate (no system deps, runs on every push)
  # ───────────────────────────────────────────────────────────────
  core-test:
    name: Core crate test + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/metardu-core"

      - name: Cargo test (metardu-core)
        # Runs every #[test] in the core crate — NTRIP CRC-24Q
        # verification, NODATA handling, license sign/verify round-
        # trip, triage parsing, etc. ~90 tests, sub-minute runtime.
        working-directory: crates/metardu-core
        run: cargo test --verbose

      - name: Cargo test (metardu-core integration)
        # Integration tests in tests/ — exercises the public API
        # across module boundaries. Catches accidental reliance on
        # internal types that unit tests miss.
        working-directory: crates/metardu-core
        run: cargo test --test integration --verbose

      - name: Install cargo-audit
        # Scans Cargo.lock for known CVEs in dependencies. Fails the
        # build if any advisory applies. Run on every push so a new
        # advisory is caught within hours of publication, not at the
        # next release.
        run: cargo install cargo-audit --locked || true

      - name: Cargo audit (metardu-core)
        working-directory: crates/metardu-core
        run: cargo audit --deny warnings

      - name: Install cargo-deny
        # cargo-deny is stricter than cargo-audit: it also checks for
        # duplicate deps, banned crates, and license compliance. The
        # deny.toml at the repo root controls what's allowed.
        run: cargo install cargo-deny --locked || true

      - name: Cargo deny (license + duplicate-dep check)
        # Runs against the root workspace. deny.toml at the repo root
        # controls the policy: MIT-compatible licenses only, no GPL/AGPL,
        # warn on duplicate versions, deny wildcard deps.
        working-directory: crates/metardu-core
        run: cargo deny check licenses bans sources

      - name: Install cargo-cyclonedx
        # Generates a CycloneDX SBOM (Software Bill of Materials) for
        # each crate. Required for IHO S-44 / JORC compliance customers.
        run: cargo install cargo-cyclonedx --locked || true

      - name: Generate SBOM (metardu-core)
        # Produces bom.json + bom.xml in crates/metardu-core/
        working-directory: crates/metardu-core
        run: cargo cyclonedx --format json --format xml -v

      - name: Generate SBOM (src-tauri)
        working-directory: src-tauri
        run: cargo cyclonedx --format json --format xml -v

      - name: Generate SBOM (metardu-eom-cli)
        working-directory: metardu-eom-cli
        run: cargo cyclonedx --format json --format xml -v

      - name: Generate SBOM (metardu-verify)
        working-directory: metardu-verify
        run: cargo cyclonedx --format json --format xml -v

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: |
            crates/metardu-core/bom.*
            src-tauri/bom.*
            metardu-eom-cli/bom.*
            metardu-verify/bom.*
          retention-days: 30

  # ───────────────────────────────────────────────────────────────
  # Code coverage — cargo-tarpaulin on the core crate + upload to Codecov
  # ───────────────────────────────────────────────────────────────
  coverage:
    name: Code coverage (metardu-core)
    runs-on: ubuntu-latest
    # Coverage runs on every push to main + PRs. The codecov upload
    # uses CODECOV_TOKEN (set in repo secrets). Without a token, the
    # upload still works for public repos but is rate-limited.
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/metardu-core"

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked || true

      - name: Run cargo-tarpaulin (metardu-core)
        # Generates lcov + Cobertura coverage reports for the core crate.
        # We only cover the core crate — src-tauri needs GTK system libs
        # which tarpaulin doesn't play well with in CI.
        working-directory: crates/metardu-core
        run: cargo tarpaulin --workspace --out lcov --out xml --output-dir coverage/ -- --lib

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: crates/metardu-core/coverage/lcov.info
          flags: metardu-core
          name: metardu-core-coverage
          fail_ci_if_error: false
          # token: ${{ secrets.CODECOV_TOKEN }} # uncomment for private repos

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: crates/metardu-core/coverage/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────
  # Fuzz testing — bounded runs on every push to catch parser crashes
  # ───────────────────────────────────────────────────────────────
  fuzz:
    name: Fuzz parsers (bounded)
    runs-on: ubuntu-latest
    # Fuzzing is intensive — only run on main pushes and PRs, not
    # every branch push. Set continue-on-error so a crash discovery
    # doesn't block the build — the crashes are reported as artifacts.
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust nightly (cargo-fuzz requires nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked || true

      - name: Cargo cache (fuzz workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/metardu-core/fuzz"

      - name: Fuzz LAS header parser (60s)
        # Bounded to 60s — enough to find obvious crashes without
        # blocking CI. Full fuzzing campaigns run locally overnight.
        working-directory: crates/metardu-core
        run: timeout 90 cargo fuzz run fuzz_las_header -- -max_total_time=60 -max_len=4096 || true

      - name: Fuzz LAS point reader (60s)
        working-directory: crates/metardu-core
        run: timeout 90 cargo fuzz run fuzz_las_points -- -max_total_time=60 -max_len=4096 || true

      - name: Fuzz RTCM parser (60s)
        working-directory: crates/metardu-core
        run: timeout 90 cargo fuzz run fuzz_rtcm_parse -- -max_total_time=60 -max_len=4096 || true

      - name: Fuzz NTRIP base64 encoder (30s)
        working-directory: crates/metardu-core
        run: timeout 60 cargo fuzz run fuzz_ntrip_base64 -- -max_total_time=30 -max_len=1024 || true

      - name: Upload crash artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes
          path: |
            crates/metardu-core/fuzz/artifacts/*/crash-*
            crates/metardu-core/fuzz/artifacts/*/oom-*
          if-no-files-found: ignore
          retention-days: 30

  # ───────────────────────────────────────────────────────────────
  # Build + test the standalone CLI binaries (no system deps needed)
  # ───────────────────────────────────────────────────────────────
  standalone-binaries:
    name: Standalone binaries (eom-cli + verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            metardu-eom-cli
            metardu-verify

      - name: Cargo test + build (metardu-eom-cli)
        # The EOM CLI is the signing authority's tool — a regression
        # here means licenses can't be issued. Build + test on every
        # push so a broken main is caught within hours.
        working-directory: metardu-eom-cli
        run: |
          cargo test --verbose
          cargo build --release

      - name: Cargo test + build (metardu-verify)
        # metardu-verify is the public-facing trust tool — anyone can
        # run it to verify a MetaRDU chain-of-custody PDF. A regression
        # here undermines the entire audit trail. Build + test on every
        # push.
        working-directory: metardu-verify
        run: |
          cargo test --verbose
          cargo build --release

      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: standalone-binaries-linux-x64
          path: |
            metardu-eom-cli/target/release/metardu-eom-cli
            metardu-verify/target/release/metardu-verify
          retention-days: 7

  # ───────────────────────────────────────────────────────────────
  # Rust formatting + clippy (fast, runs on every push)
  # ───────────────────────────────────────────────────────────────
  rust-check:
    name: Rust fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: Cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Cargo clippy (default features)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Cargo test (src-tauri)
        # Run the IPC command tests + any tests in the Tauri shell
        # crate. These need the GTK system libs (unlike the core
        # crate), so they live in this job rather than core-test.
        working-directory: src-tauri
        run: cargo test --lib --verbose

      - name: Cargo clippy (geo-proj feature)
        working-directory: src-tauri
        run: cargo clippy --all-targets --features geo-proj -- -D warnings
        continue-on-error: true  # CI-only verification — system libs may be missing

      - name: Build metardu-worker binary
        working-directory: src-tauri
        run: cargo build --bin metardu-worker --release

  # ───────────────────────────────────────────────────────────────
  # Build the Tauri binary on all 3 platforms (only on main pushes)
  # ───────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.os }}
    needs: [frontend-check, rust-check, core-test, standalone-binaries]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
          - os: macos-14
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            label: macos-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: Install frontend deps
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build Tauri app
        run: cargo tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Build metardu-worker binary
        working-directory: src-tauri
        run: cargo build --bin metardu-worker --release --target ${{ matrix.target }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: metardu-industrial-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/metardu-worker*
          retention-days: 14
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────
  # E2E tests — Playwright browser-mode smoke tests
  # ───────────────────────────────────────────────────────────────
  e2e:
    name: E2E tests (browser mode)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: npm ci

      - name: Install E2E deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        env:
          CI: true
        run: npm test

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: e2e/test-results/
          retention-days: 7
